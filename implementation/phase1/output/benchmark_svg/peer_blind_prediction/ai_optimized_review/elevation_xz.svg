<script><![CDATA[(function(){const svg=document.currentScript&&document.currentScript.ownerSVGElement;if(!svg)return;const params=new URLSearchParams(window.location.search);const activeMember=(params.get('member')||params.get('member_id')||'').trim();const viewerParam=(params.get('viewer')||'').trim();const baseHref=viewerParam||svg.getAttribute('data-viewer-base-url')||'../../../src/structure-viewer/index.html';const sheetKey=svg.getAttribute('data-sheet-key')||'elevation_xz';const currentView=svg.getAttribute('data-view-label')||'Elevation View (X-Z)';function buildHref(memberId){if(!memberId)return'';try{const url=new URL(baseHref,window.location.href);url.searchParams.set('member',memberId);url.searchParams.set('focus_member',memberId);url.searchParams.set('drawing_sheet',sheetKey);url.searchParams.set('drawing_view',currentView);return url.href;}catch(_err){return baseHref;}}svg.querySelectorAll('[data-viewer-member-id]').forEach(anchor=>{const memberId=(anchor.getAttribute('data-viewer-member-id')||'').trim();const href=buildHref(memberId);if(href)anchor.setAttribute('href',href);anchor.setAttribute('target','_blank');});const toolbar=svg.querySelector('#svg-review-toolbar');const toolbarLink=svg.querySelector('#svg-open-viewer-link');const toolbarLabel=svg.querySelector('#svg-open-viewer-label');if(activeMember){svg.querySelectorAll('[data-member-id]').forEach(node=>{node.classList.toggle('is-active',(node.getAttribute('data-member-id')||'').trim()===activeMember);});svg.querySelectorAll('[data-callout-member-id]').forEach(node=>{node.classList.toggle('is-active',(node.getAttribute('data-callout-member-id')||'').trim()===activeMember);});if(toolbar&&toolbarLink){const href=buildHref(activeMember);if(href){toolbarLink.setAttribute('href',href);toolbar.setAttribute('visibility','visible');if(toolbarLabel)toolbarLabel.textContent='Open 3D Viewer · #'+activeMember;}}}})();]]></script>
