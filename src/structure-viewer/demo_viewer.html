html,body{height:100%}

background:

#info{

display:flex;
flex-direction:column;
gap:14px;
pointer-events:none;
user-select:none
}
#info::before{
content:'';
position:absolute;
left:18px;
right:18px;

#info .eyebrow{

color:#96a8bb;
font-size:11px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase
}
#info h2{

font-size:clamp(24px,4vw,32px);
line-height:1.02;
letter-spacing:-.04em
}
#info .lede{
margin:0;
color:#96a8bb;
font-size:13px;
line-height:1.55
}
#info .stats{
display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:10px
}
#info .stat{
padding:12px 13px 11px;
border-radius:18px;
border:1px solid rgba(148,168,190,.16);
background:
linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
rgba(10,18,29,.56)
}
#info .stat span{
display:block;
margin-bottom:4px;
color:#96a8bb;
font-size:10px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase
}
#info .stat strong{
display:block;
color:#ecf2f6;
font-family:'Space Grotesk','IBM Plex Sans KR',sans-serif;
font-size:22px;
line-height:1;
letter-spacing:-.03em
}
#info .chips{
display:flex;
flex-wrap:wrap;
gap:8px
}
#info .chip{
display:inline-flex;
align-items:center;
min-height:32px;
padding:8px 12px;
border-radius:999px;
border:1px solid rgba(148,168,190,.18);
background:
linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02)),
rgba(14,24,35,.58);
color:#ecf2f6;
font-size:12px;
font-weight:700
}
#info .chip--accent{
border-color:rgba(79,183,173,.24);
background:rgba(79,183,173,.12);
color:#c9f3ee
}
#info .chip--warm{
border-color:rgba(244,181,107,.22);
background:rgba(244,181,107,.14);
color:#ffe2bc
}
@media (max-width:720px){
#info{width:calc(100vw - 20px);top:10px;left:10px;padding:14px 14px 16px}
#info .stats{grid-template-columns:1fr}
}
</style>

const geo=new THREE.BufferGeometry();
const p=new Float32Array([v[0].x,v[0].y,v[0].z,v[1].x,v[1].y,v[1].z,v[2].x,v[2].y,v[2].z,v[0].x,v[0].y,v[0].z,v[2].x,v[2].y,v[2].z,v[3].x,v[3].y,v[3].z]);
geo.setAttribute('position',new THREE.BufferAttribute(p,3));geo.computeVertexNormals();
scene.add(new THREE.Mesh(geo,new THREE.MeshPhongMaterial({color:c,transparent:true,opacity:.4,side:THREE.DoubleSide})));
}});
const box=new THREE.Box3().setFromObject(scene);const ctr=box.getCenter(new THREE.Vector3());
ctrl.target.copy(ctr);cam.position.copy(ctr).add(new THREE.Vector3(50,35,50));
(function anim(){requestAnimationFrame(anim);ctrl.update();r.render(scene,cam)})();
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
</script>
