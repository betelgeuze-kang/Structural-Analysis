[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arch-struct-analysis-phase1"
version = "0.1.0"
description = "Structural dynamics/AI validation pipeline (Phase1)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.23",
  "matplotlib>=3.7",
  "jsonschema>=4.20",
]

[project.optional-dependencies]
ml = [
  "torch>=2.1",
]
dev = [
  "pytest>=8.0",
  "ruff>=0.5",
]

[tool.setuptools]
py-modules = []

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = ["tests"]

