name: Workflow Contract CI

# Lightweight syntax/shape validation for every GitHub Actions workflow. This
# keeps scheduled, release, deploy, AI, frontend, viewer, and heavy CI edits
# covered without forcing the full solver gate to run for YAML-only changes.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: ["main", "codex/**", "web/**", "feat/**"]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: workflow-contract-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ${{ fromJSON(vars.STRUCTURAL_ACTIONS_RUNNER_LABELS || '["self-hosted","linux","x64"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate workflow YAML and required shape
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          errors = []
          paths = sorted(Path('.github/workflows').glob('*.y*ml'))
          if not paths:
              errors.append('no workflow files found')

          for path in paths:
              try:
                  payload = yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  errors.append(f'{path}: YAML parse failed: {exc}')
                  continue

              if not isinstance(payload, dict):
                  errors.append(f'{path}: top level must be a mapping')
                  continue

              # YAML 1.1 parsers may normalize the unquoted key `on` to True.
              if 'on' not in payload and True not in payload:
                  errors.append(f'{path}: missing on trigger')
              jobs = payload.get('jobs')
              if not isinstance(jobs, dict) or not jobs:
                  errors.append(f'{path}: jobs must be a non-empty mapping')

          if errors:
              print('\n'.join(errors), file=sys.stderr)
              raise SystemExit(1)

          print(f'validated {len(paths)} workflow file(s)')
          PY
