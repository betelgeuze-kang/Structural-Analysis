name: Viewer Browser CI

# Structure-viewer-specific verification, separated from generic Workbench CI.
# Workflow YAML itself is checked by workflow-contract-ci.yml.

on:
  pull_request:
    paths:
      - "src/structure-viewer/**"
      - "tests/frontend/structure-viewer-smoke.spec.ts"
      - "scripts/verify-frontend-browser-smoke.mjs"
      - "scripts/structure-viewer-*.mjs"
      - "scripts/verify-structure-viewer-project-manifest.mjs"
      - "scripts/verify_structure_viewer_contracts.py"
      - "tests/test_structure_viewer_*.py"
      - "tests/test_viewer_shared_selection_contract.py"
      - "tests/test_generate_selfcontained_viewer.py"
      - "package.json"
      - "package-lock.json"
  push:
    branches: ["main", "codex/**", "web/**", "feat/**"]
    paths:
      - "src/structure-viewer/**"
      - "tests/frontend/structure-viewer-smoke.spec.ts"
      - "scripts/verify-frontend-browser-smoke.mjs"
      - "scripts/structure-viewer-*.mjs"
      - "scripts/verify-structure-viewer-project-manifest.mjs"
      - "scripts/verify_structure_viewer_contracts.py"
      - "tests/test_structure_viewer_*.py"
      - "tests/test_viewer_shared_selection_contract.py"
      - "tests/test_generate_selfcontained_viewer.py"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

concurrency:
  group: viewer-browser-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  viewer-smoke:
    runs-on: ${{ fromJSON(vars.STRUCTURAL_FRONTEND_RUNNER_LABELS || vars.STRUCTURAL_ACTIONS_RUNNER_LABELS || '["self-hosted","linux","x64"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python package
        run: python -m pip install -e .[dev]

      - name: Verify viewer manifest
        run: npm run verify:viewer-manifest

      - name: Verify viewer contracts
        run: python scripts/verify_structure_viewer_contracts.py

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Minimal structure-viewer browser smoke
        run: npm run verify:frontend-browser-smoke -- --mode minimal
