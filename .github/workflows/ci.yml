name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Install Python package
        run: python -m pip install -e .[dev]

      - name: Repository hygiene
        run: python scripts/check_repo_hygiene.py --show-ok

      - name: Release artifact manifest
        run: python scripts/verify_release_artifacts_manifest.py --manifest implementation/phase1/release_artifacts_manifest.json --structure-only

      - name: Real project corpus provenance
        run: |
          python implementation/phase1/validate_real_project_corpus_manifest.py \
            --schema implementation/phase1/real_project_corpus_manifest.schema.json \
            --manifest implementation/phase1/real_project_corpus_seed_manifest.json \
            --show-summary
          python implementation/phase1/generate_real_project_parser_coverage_matrix.py \
            --manifest implementation/phase1/real_project_corpus_seed_manifest.json \
            --out implementation/phase1/real_project_parser_coverage_matrix.json
          python implementation/phase1/build_peer_tbi_benchmark_metric_records.py \
            --manifest implementation/phase1/real_project_corpus_seed_manifest.json \
            --coverage-matrix implementation/phase1/real_project_parser_coverage_matrix.json \
            --out implementation/phase1/peer_tbi_benchmark_metric_records.json
          python implementation/phase1/build_real_project_row_provenance_report.py \
            --manifest implementation/phase1/real_project_corpus_seed_manifest.json \
            --coverage-matrix implementation/phase1/real_project_parser_coverage_matrix.json \
            --peer-metric-records implementation/phase1/peer_tbi_benchmark_metric_records.json \
            --out implementation/phase1/real_project_row_provenance_report.json

      - name: Python tests
        run: |
          python -m pytest -q tests/test_generate_optimized_drawing_review_ui.py
          python -m pytest -q tests/test_generate_release_project_registry_bootstrap.py tests/test_release_registry.py
          python -m pytest -q tests/test_real_project_corpus_manifest.py
          python -m pytest -q tests/test_real_project_parser_coverage_matrix.py
          python -m pytest -q tests/test_build_peer_tbi_benchmark_metric_records.py
          python -m pytest -q tests/test_build_real_project_row_provenance_report.py

      - name: Frontend contract
        run: npm run verify:frontend-contract

      - name: Frontend smoke
        run: npm run verify:frontend-smoke

      - name: Generated artifact drift
        run: python3 scripts/check_generated_worktree_clean.py --show-ok
