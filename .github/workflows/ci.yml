name: CI

on:
  push:
    branches: ["main", "codex/**"]
    paths-ignore:
      - "src/**"
      - "prototype/**"
      - "tests/frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-web-ci.yml"
      - ".github/workflows/deploy-pages.yml"
  pull_request:
    paths-ignore:
      - "src/**"
      - "prototype/**"
      - "tests/frontend/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/frontend-web-ci.yml"
      - ".github/workflows/deploy-pages.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ${{ fromJSON(vars.STRUCTURAL_ACTIONS_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Install Python package
        run: python -m pip install -e .[dev]

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: PR quality gate
        run: python scripts/verify_quality_gate.py --mode pr
