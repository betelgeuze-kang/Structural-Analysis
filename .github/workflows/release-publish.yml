name: Publish Release Assets

on:
  workflow_dispatch:
    inputs:
      replace_existing:
        description: "Delete and replace same-named release assets if the release already has them"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      promote_manifest:
        description: "Commit the verified candidate manifest back to implementation/phase1/release_artifacts_manifest.json"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ${{ fromJSON(vars.STRUCTURAL_ACTIONS_RUNNER_LABELS || '["self-hosted","linux","x64"]') }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Prepare release workspace paths
        run: |
          {
            echo "RELEASE_ROOT=$RUNNER_TEMP/structural-release-upload-root"
            echo "RELEASE_WORK=$RUNNER_TEMP/structural-release-private-work"
            echo "HYDRATED_RELEASE_ROOT=$RUNNER_TEMP/structural-release-hydrated-assets"
            echo "CANDIDATE_MANIFEST=$RUNNER_TEMP/structural-release-candidate-manifest.json"
            echo "RELEASE_ASSETS_JSON=$RUNNER_TEMP/structural-release-assets.json"
            echo "RELEASE_UPLOAD_PLAN=$RUNNER_TEMP/structural-release-upload-plan.json"
            echo "RELEASE_METADATA_PREFLIGHT=$RUNNER_TEMP/structural-release-metadata-preflight.json"
            echo "P0_STATUS_JSON=$RUNNER_TEMP/structural-p0-closure-status.json"
            echo "P0_STATUS_MD=$RUNNER_TEMP/structural-p0-closure-status.md"
            echo "PUBLICATION_REPORT_JSON=$RUNNER_TEMP/structural-release-publication-report.json"
            echo "PUBLICATION_REPORT_MD=$RUNNER_TEMP/structural-release-publication-report.md"
            echo "PUBLICATION_EVIDENCE_INDEX=$RUNNER_TEMP/structural-release-publication-evidence-index.json"
            echo "POST_PUBLISH_ROUNDTRIP_JSON=$RUNNER_TEMP/structural-post-publish-roundtrip.json"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install -e .[dev]

      - name: Source boundary preflight
        run: |
          python scripts/check_repo_hygiene.py --show-ok --strict-source-boundary
          python scripts/check_git_remote_safety.py --show-ok
          python scripts/verify_release_artifacts_manifest.py \
            --manifest implementation/phase1/release_artifacts_manifest.json \
            --structure-only

      - name: Regenerate release viewer artifacts
        run: |
          echo "Release workflow github.sha: $GITHUB_SHA"
          echo "Release workflow checkout HEAD: $(git rev-parse HEAD)"
          echo "Track irregularity generator import preflight:"
          nl -ba implementation/phase1/track_irregularity_generator.py | sed -n '1,32p'
          set +e
          python implementation/phase1/run_nightly_release_gate.py \
            --skip-promotion \
            --skip-archive \
            --no-enable-hip-kernel-smoke \
            --allow-cpu-required
          nightly_status=$?
          if [ -f implementation/phase1/release/nightly_release_gate_report.json ]; then
            echo "Nightly release gate summary:"
            python - <<'PY'
          import json
          from pathlib import Path

          report = Path("implementation/phase1/release/nightly_release_gate_report.json")
          payload = json.loads(report.read_text(encoding="utf-8"))
          print(f"reason_code={payload.get('reason_code', '')}")
          print(f"reason={payload.get('reason', '')}")

          def print_step_report(step):
              report_path = Path(str(step.get("report_path", "") or ""))
              if not report_path.is_file():
                  return
              try:
                  step_payload = json.loads(report_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"failed_step_report_load_error={exc}")
                  return
              print(f"failed_step_report_path={report_path}")
              print(f"failed_step_report_reason_code={step_payload.get('reason_code', '')}")
              print(f"failed_step_report_reason={step_payload.get('reason', '')}")
              checks = step_payload.get("checks")
              if isinstance(checks, dict):
                  failed_checks = [str(key) for key, value in checks.items() if not bool(value)]
                  if failed_checks:
                      print("failed_step_report_failed_checks=" + ",".join(failed_checks))
              for child in step_payload.get("steps", []):
                  if int(child.get("return_code", 0) or 0) != 0:
                      print(f"failed_step_report_child_step={child.get('step', '')}")
                      print(f"failed_step_report_child_return_code={child.get('return_code', '')}")
                      child_stdout = str(child.get("stdout_tail", "") or "").strip()
                      child_stderr = str(child.get("stderr_tail", "") or "").strip()
                      if child_stdout:
                          print("failed_step_report_child_stdout_tail:")
                          print(child_stdout)
                      if child_stderr:
                          print("failed_step_report_child_stderr_tail:")
                          print(child_stderr)
                      break

          for step in payload.get("steps", []):
              if int(step.get("return_code", 0) or 0) != 0:
                  print(f"failed_step={step.get('step', '')}")
                  print(f"return_code={step.get('return_code', '')}")
                  print_step_report(step)
                  stdout_tail = str(step.get("stdout_tail", "") or "").strip()
                  stderr_tail = str(step.get("stderr_tail", "") or "").strip()
                  if stdout_tail:
                      print("stdout_tail:")
                      print(stdout_tail)
                  if stderr_tail:
                      print("stderr_tail:")
                      print(stderr_tail)
                  break
          PY
          fi
          if [ "$nightly_status" -ne 0 ]; then
            exit "$nightly_status"
          fi
          python implementation/phase1/export_optimized_drawing_expert_review_pdf.py \
            --expert-review-metadata-json implementation/phase1/release/visualization/optimized_drawing_expert_review.metadata.json \
            --out-pdf implementation/phase1/release/visualization/optimized_drawing_expert_review.pdf
          python scripts/materialize_release_publication_sidecars.py

      - name: Build fresh publication candidate
        run: |
          python scripts/build_release_publication_candidate.py \
            --manifest implementation/phase1/release_artifacts_manifest.json \
            --artifact-root "$RELEASE_ROOT" \
            --work-dir "$RELEASE_WORK" \
            --manifest-out "$CANDIDATE_MANIFEST" \
            --write
          python scripts/verify_release_artifacts_manifest.py \
            --manifest "$CANDIDATE_MANIFEST" \
            --artifact-root "$RELEASE_ROOT" \
            --require-artifacts
          python scripts/verify_release_artifacts_manifest.py \
            --manifest "$CANDIDATE_MANIFEST" \
            --artifact-root "$RELEASE_ROOT" \
            --hydrate-preflight \
            --out "$RELEASE_METADATA_PREFLIGHT"
          python scripts/prepare_release_upload_plan.py \
            --manifest "$CANDIDATE_MANIFEST" \
            --artifact-root "$RELEASE_ROOT" \
            --out "$RELEASE_UPLOAD_PLAN"

      - name: Strict release quality gate
        run: |
          python scripts/verify_quality_gate.py --mode release

      - name: Publish manifest-listed release assets
        run: |
          replace_flag=""
          if [ "${{ inputs.replace_existing }}" = "true" ]; then
            replace_flag="--replace-existing"
          fi
          python scripts/publish_github_release_assets.py \
            --repo "${{ github.repository }}" \
            --manifest "$CANDIDATE_MANIFEST" \
            --artifact-root "$RELEASE_ROOT" \
            --assets-out "$RELEASE_ASSETS_JSON" \
            $replace_flag

      - name: Verify published release closure
        run: |
          release_tag="$(python -c 'import json, sys; print(json.load(open(sys.argv[1]))["release_tag"])' "$CANDIDATE_MANIFEST")"
          python scripts/fetch_github_release_assets.py \
            --repo "${{ github.repository }}" \
            --tag "$release_tag" \
            --out "$RELEASE_ASSETS_JSON"
          python scripts/check_release_asset_listing.py \
            --manifest "$CANDIDATE_MANIFEST" \
            --assets-json "$RELEASE_ASSETS_JSON" \
            --require-all \
            --require-exact

      - name: Hydrate published release assets
        run: |
          python scripts/hydrate_github_release_assets.py \
            --repo "${{ github.repository }}" \
            --manifest "$CANDIDATE_MANIFEST" \
            --artifact-root "$HYDRATED_RELEASE_ROOT" \
            --out "$POST_PUBLISH_ROUNDTRIP_JSON" \
            --write
          python scripts/verify_release_artifacts_manifest.py \
            --manifest "$CANDIDATE_MANIFEST" \
            --artifact-root "$HYDRATED_RELEASE_ROOT"
          python scripts/check_release_p0_closure.py \
            --manifest "$CANDIDATE_MANIFEST" \
            --assets-json "$RELEASE_ASSETS_JSON" \
            --artifact-root "$RELEASE_ROOT" \
            --upload-plan-json "$RELEASE_UPLOAD_PLAN" \
            --metadata-preflight-json "$RELEASE_METADATA_PREFLIGHT" \
            --post-publish-roundtrip-json "$POST_PUBLISH_ROUNDTRIP_JSON" \
            --tag-ref-present true \
            --require-all \
            --require-exact \
            --fail-unclosed
          python scripts/check_p0_closure_status.py \
            --manifest "$CANDIDATE_MANIFEST" \
            --release-assets-json "$RELEASE_ASSETS_JSON" \
            --artifact-root "$RELEASE_ROOT" \
            --upload-plan-json "$RELEASE_UPLOAD_PLAN" \
            --metadata-preflight-json "$RELEASE_METADATA_PREFLIGHT" \
            --post-publish-roundtrip-json "$POST_PUBLISH_ROUNDTRIP_JSON" \
            --tag-ref-present \
            --out "$P0_STATUS_JSON" \
            --out-md "$P0_STATUS_MD" \
            --fail-open

      - name: Write publication failure report
        if: always()
        env:
          PUBLICATION_JOB_STATUS: ${{ job.status }}
        run: |
          set +e
          p0_manifest="$CANDIDATE_MANIFEST"
          if [ ! -f "$p0_manifest" ]; then
            p0_manifest="implementation/phase1/release_artifacts_manifest.json"
          fi
          if [ -f scripts/check_p0_closure_status.py ] && [ ! -s "$P0_STATUS_JSON" ]; then
            python3 scripts/check_p0_closure_status.py \
              --manifest "$p0_manifest" \
              --out "$P0_STATUS_JSON" \
              --out-md "$P0_STATUS_MD" || true
          fi
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          def load_json(path: str) -> dict:
              target = Path(path)
              if not target.exists():
                  return {}
              try:
                  payload = json.loads(target.read_text(encoding="utf-8"))
              except Exception as exc:
                  return {"load_error": str(exc)}
              return payload if isinstance(payload, dict) else {"load_error": "payload was not a JSON object"}

          def file_status(path: str) -> dict:
              target = Path(path)
              return {
                  "path": str(target),
                  "exists": target.exists(),
                  "bytes": target.stat().st_size if target.exists() else 0,
              }

          nightly_report = "implementation/phase1/release/nightly_release_gate_report.json"
          p0_status_json = os.environ["P0_STATUS_JSON"]
          report_json = Path(os.environ["PUBLICATION_REPORT_JSON"])
          report_md = Path(os.environ["PUBLICATION_REPORT_MD"])
          p0_payload = load_json(p0_status_json)
          nightly_payload = load_json(nightly_report)
          payload = {
              "schema_version": "release-publication-report.v1",
              "failure_report_written": True,
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "job_status": os.environ.get("PUBLICATION_JOB_STATUS", ""),
              "inputs": {
                  "replace_existing": "${{ inputs.replace_existing }}",
                  "promote_manifest": "${{ inputs.promote_manifest }}",
              },
              "files": {
                  "candidate_manifest": file_status(os.environ["CANDIDATE_MANIFEST"]),
                  "release_assets_json": file_status(os.environ["RELEASE_ASSETS_JSON"]),
                  "release_upload_plan": file_status(os.environ["RELEASE_UPLOAD_PLAN"]),
                  "release_metadata_preflight": file_status(os.environ["RELEASE_METADATA_PREFLIGHT"]),
                  "hydrated_release_root": file_status(os.environ["HYDRATED_RELEASE_ROOT"]),
                  "p0_status_json": file_status(p0_status_json),
                  "p0_status_md": file_status(os.environ["P0_STATUS_MD"]),
                  "post_publish_roundtrip_json": file_status(os.environ["POST_PUBLISH_ROUNDTRIP_JSON"]),
                  "nightly_release_gate_report": file_status(nightly_report),
              },
              "nightly_release_gate": {
                  "reason_code": str(nightly_payload.get("reason_code", "") or ""),
                  "reason": str(nightly_payload.get("reason", "") or ""),
                  "contract_pass": nightly_payload.get("contract_pass"),
              },
              "p0_closure": {
                  "status": str(p0_payload.get("status", "") or ""),
                  "p0_closed": bool(p0_payload.get("p0_closed", False)),
                  "release_publication_closed": bool(p0_payload.get("release_publication_closed", False)),
                  "core_evidence_closed": bool(p0_payload.get("core_evidence_closed", False)),
                  "next_action": str(p0_payload.get("next_action", "") or ""),
              },
          }
          report_json.parent.mkdir(parents=True, exist_ok=True)
          report_json.write_text(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          report_md.write_text(
              "\n".join(
                  [
                      "# Release Publication Report",
                      "",
                      f"- Failure report written: `{payload['failure_report_written']}`",
                      f"- Job status: `{payload['job_status']}`",
                      f"- P0 status: `{payload['p0_closure']['status']}`",
                      f"- P0 closed: `{payload['p0_closure']['p0_closed']}`",
                      f"- Release publication closed: `{payload['p0_closure']['release_publication_closed']}`",
                      f"- Next action: `{payload['p0_closure']['next_action']}`",
                      f"- Nightly reason code: `{payload['nightly_release_gate']['reason_code']}`",
                      "",
                  ]
              ),
              encoding="utf-8",
          )
          roundtrip_json = Path(os.environ["POST_PUBLISH_ROUNDTRIP_JSON"])
          if not roundtrip_json.exists():
              roundtrip_json.write_text(
                  json.dumps(
                      {
                          "ok": False,
                          "schema_version": "release-post-publish-roundtrip.v1",
                          "status": "not_run",
                          "reason": "post-publish hydrate round-trip did not complete before report collation",
                          "generated_at": payload["generated_at"],
                          "artifact_root": os.environ["HYDRATED_RELEASE_ROOT"],
                          "manifest": p0_manifest,
                      },
                      ensure_ascii=False,
                      indent=2,
                      sort_keys=True,
                  )
                  + "\n",
                  encoding="utf-8",
              )
          PY
          python3 scripts/build_release_publication_evidence_index.py \
            --manifest "$p0_manifest" \
            --release-assets-json "$RELEASE_ASSETS_JSON" \
            --artifact-root "$RELEASE_ROOT" \
            --upload-plan-json "$RELEASE_UPLOAD_PLAN" \
            --metadata-preflight-json "$RELEASE_METADATA_PREFLIGHT" \
            --p0-status-json "$P0_STATUS_JSON" \
            --p0-status-md "$P0_STATUS_MD" \
            --publication-report-json "$PUBLICATION_REPORT_JSON" \
            --post-publish-roundtrip-json "$POST_PUBLISH_ROUNDTRIP_JSON" \
            --out "$PUBLICATION_EVIDENCE_INDEX" || true

      - name: Upload publication evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-publication-evidence
          path: |
            ${{ runner.temp }}/structural-release-candidate-manifest.json
            ${{ runner.temp }}/structural-release-assets.json
            ${{ runner.temp }}/structural-release-upload-plan.json
            ${{ runner.temp }}/structural-release-metadata-preflight.json
            ${{ runner.temp }}/structural-p0-closure-status.json
            ${{ runner.temp }}/structural-p0-closure-status.md
            ${{ runner.temp }}/structural-release-publication-report.json
            ${{ runner.temp }}/structural-release-publication-report.md
            ${{ runner.temp }}/structural-release-publication-evidence-index.json
            ${{ runner.temp }}/structural-post-publish-roundtrip.json
            implementation/phase1/release/nightly_release_gate_report.json
          if-no-files-found: error

      - name: Promote verified manifest
        if: ${{ inputs.promote_manifest == 'true' }}
        run: |
          cp "$CANDIDATE_MANIFEST" implementation/phase1/release_artifacts_manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add implementation/phase1/release_artifacts_manifest.json
          if git diff --cached --quiet; then
            echo "Candidate manifest already matches source manifest."
          else
            git commit -m "Promote verified release artifact manifest"
            git push origin HEAD:${{ github.ref_name }}
          fi
